<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Pixelify+Sans:400,600&display=swap" rel="stylesheet">
    <title>RunBuddy - Customize</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            font-family: 'Pixelify Sans', sans-serif;
        }

        .phone-container {
            position: relative;
            width: 393px;
            height: 852px;
            overflow: hidden;
            border: none;
            border-radius: 0;
            background-color: #f4ebd3;
        }

        .page-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .hotspot {
            position: absolute;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 1;
        }

        .top-right-actions {
            position: absolute;
            top: 16px;
            right: 12px;
            display: flex;
            gap: 10px;
            z-index: 12;
        }

        .top-right-action {
            display: block;
            width: 57px;
            height: 57px;
        }

        .top-right-action img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* .hotspot { border: 1px solid white; } */
    </style>
</head>
<body>
    <div class="phone-container">
        <img src="images/iPhone 17 - 30.png" alt="Customize Page" class="page-bg">

        <div class="top-right-actions" aria-label="Top right actions">
            <a href="iphone17-31.html" class="top-right-action" aria-label="Go to iPhone 17 - 31 page">
                <img src="images/Group 125.png" alt="Go to iPhone 17 - 31 page">
            </a>
            <a href="customize.html" class="top-right-action" aria-label="Back to customize">
                <img src="images/Group 119 (1).png" alt="Back to customize">
            </a>
        </div>
    </div>
</body>
</html>
