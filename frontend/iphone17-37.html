<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunBuddy</title>
    <link href="https://fonts.googleapis.com/css?family=Pixelify+Sans:400,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            font-family: "Pixelify Sans", sans-serif;
        }

        .phone {
            position: relative;
            width: 393px;
            height: 852px;
            overflow: hidden;
            border: none;
            border-radius: 0;
            background: #f4ebd3;
        }

        .bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .top-strip {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 62px;
            background: #9fcce0;
            z-index: 10;
        }

        .back-button {
            position: absolute;
            top: 83px;
            left: 24px;
            width: 12px;
            height: 20px;
            z-index: 4;
            border: 0;
            padding: 0;
            background: transparent;
            cursor: pointer;
        }

        .back-button img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .editor-card {
            position: absolute;
            top: 133px;
            left: 21px;
            width: 362px;
            min-height: 211px;
            border-radius: 12px;
            background: #f4ebd3;
            padding: 32px 24px 27px;
            z-index: 3;
        }

        .editor-text {
            margin-bottom: 65px;
            font-size: 16px;
            color: #21201e;
        }

        .editor-text textarea {
            width: 100%;
            min-height: 100px;
            border: none;
            background: transparent;
            font-family: "Pixelify Sans", sans-serif;
            font-size: 16px;
            color: #21201e;
            resize: none;
            outline: none;
        }

        .add-tile {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 68px;
            height: 68px;
            border: 0;
            border-radius: 12px;
            background: rgba(177, 177, 177, 0.5);
            cursor: pointer;
            overflow: hidden;
        }

        .add-tile img {
            width: 29px;
            height: 29px;
            object-fit: contain;
        }

        .preview-image {
            width: 68px;
            height: 68px;
            border-radius: 12px;
            object-fit: cover;
        }

        .preview-container {
            position: relative;
            display: inline-block;
        }

        .remove-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            background: #ff4444;
            color: white;
            font-size: 12px;
            cursor: pointer;
            line-height: 1;
        }

        .scene-images {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        .scene-left,
        .scene-right {
            position: absolute;
            width: 595px;
            height: 287px;
            object-fit: contain;
            transform: rotate(0deg);
            transform-origin: top left;
        }

        .scene-left {
            left: -64px;
            top: -124px;
        }

        .scene-right {
            left: 180px;
            top: -124px;
        }

        .post-wrap {
            position: absolute;
            left: 97px;
            right: 96px;
            bottom: 162px;
            z-index: 3;
        }

        .post-button {
            width: 209px;
            height: 114px;
            border: 0;
            padding: 39px 50px 46px;
            background: url("images/20260415040031-235-8-1@2x.png") center/cover no-repeat;
            color: #fff;
            font: 400 24px/1 "Pixelify Sans", sans-serif;
            text-shadow: 3px 4px 4px rgba(0, 0, 0, 0.25);
            cursor: pointer;
        }

        .bottom-bar {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 74px;
            background: #9fcce0;
            z-index: 2;
        }

        .loading-overlay, .success-overlay {
            position: absolute;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 40px;
        }

        .loading-overlay {
            background: rgba(0, 0, 0, 0.5);
        }

        .success-overlay {
            background: rgba(159, 204, 224, 0.95);
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f4ebd3;
            border-top-color: #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-text {
            color: #fff;
            font-size: 24px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="phone">
        <img class="bg" src="images/iphone-17-61-2@2x.png" alt="">
        <div class="top-strip" aria-hidden="true"></div>

        <button class="back-button" onclick="location.href='iphone17-8.html'" aria-label="Go back">
            <img src="images/vector.svg" alt="">
        </button>

        <section class="editor-card" aria-label="Post editor">
            <div class="editor-text">
                <textarea id="postText" placeholder="add text..."></textarea>
            </div>
            <div id="mediaContainer">
                <button class="add-tile" type="button" aria-label="Add media" onclick="document.getElementById('fileInput').click()">
                    <img src="images/tile-0122-2@2x.png" alt="" id="addIcon">
                </button>
            </div>
        </section>

        <input type="file" id="fileInput" accept="image/*" style="display: none;">

        <!-- 加载中覆盖层 -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
        </div>

        <!-- 成功提示覆盖层 -->
        <div class="success-overlay" id="successOverlay">
            <div class="success-text">Post Successfully!</div>
            <button class="post-button" onclick="location.href='iphone17-8.html'">Back</button>
        </div>

        <div class="post-wrap">
            <button class="post-button" type="button" onclick="submitPost()">Post Now</button>
        </div>

        <footer class="bottom-bar"></footer>
    </div>

    <script>
        let selectedImage = null;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    selectedImage = event.target.result;
                    updateMediaPreview();
                };
                reader.readAsDataURL(file);
            }
        });

        function updateMediaPreview() {
            const container = document.getElementById('mediaContainer');
            container.innerHTML = `
                <div class="preview-container">
                    <img src="${selectedImage}" class="preview-image" alt="Preview">
                    <button class="remove-btn" onclick="removeImage()">×</button>
                </div>
            `;
        }

        function removeImage() {
            selectedImage = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('mediaContainer').innerHTML = `
                <button class="add-tile" type="button" aria-label="Add media" onclick="document.getElementById('fileInput').click()">
                    <img src="images/tile-0122-2@2x.png" alt="" id="addIcon">
                </button>
            `;
        }

        function submitPost() {
            const text = document.getElementById('postText').value.trim();

            if (!text && !selectedImage) {
                alert('Please add some text or an image!');
                return;
            }

            // 显示加载动画
            document.getElementById('loadingOverlay').style.display = 'flex';

            // 模拟发帖延迟
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('successOverlay').style.display = 'flex';
            }, 1500);
        }
    </script>
</body>
</html>
