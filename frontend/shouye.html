<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunBuddy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; background-color: #f0f0f0; 
        }
        .phone-container {
            position: relative; width: 393px; height: 852px;
            overflow: hidden; border: none; border-radius: 0;
        }
        .page-bg { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* 通用热区样式 */
        .hotspot {
            position: absolute;
            background: transparent; 
            border: none; cursor: pointer; z-index: 10;
        }

        /* 各个区域坐标 */
        .click-area { top: 160px; left: 222px; width: 180px; height: 244px; }
        .click-area-34 { top: 470px; left: -25px; width: 182px; height: 275px; }
        .btn-iphone62 { top: 404px; left: 180px; width: 390px; height: 390px; }
        .btn-run { top: 40px; left: 10px; width: 149px; height: 109px; }
        
        /* 房子区域 */
        .btn-boddyhome { top: 160px; left: 15px; width: 160px; height: 244px; }
        
        /* 统计面板样式 */
        .stats-display {
            position: absolute;
            top: 580px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 8px 12px;
            color: white;
            font-family: 'Arial', sans-serif;
            font-size: 11px;
            z-index: 20;
            display: flex;
            gap: 12px;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .stat-icon {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <img src="images/shouye.png" alt="Shouye" class="page-bg">
        
        <!-- 累计统计显示 -->
        <div class="stats-display" id="statsDisplay">
            <div class="stat-item">
                <span class="stat-icon">🪙</span>
                <span id="totalCoins">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">🏃</span>
                <span id="totalRuns">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">📏</span>
                <span id="totalDistance">0km</span>
            </div>
        </div>
        
        <button class="hotspot click-area" onclick="goToPageBg()"></button>
        <button class="hotspot click-area-34" onclick="goToPage34()"></button>
        <button class="hotspot btn-iphone62" onclick="location.href='iphone17-62.html'"></button>
        <button class="hotspot btn-run" onclick="location.href='running.html'"></button>
        <button class="hotspot btn-boddyhome" onclick="location.href='customize.html'"></button>
    </div>

    <!-- LocalStorage 工具模块 -->
    <script src="js/storage.js"></script>
    
    <script>
        function goToPageBg() { window.location.href = 'iphone17-8.html'; }
        function goToPage34() { window.location.href = 'iphone17-34.html'; }
        
        // 页面加载时显示累计统计
        document.addEventListener('DOMContentLoaded', () => {
            const stats = Storage.getStats();
            
            document.getElementById('totalCoins').textContent = stats.totalCoins || 0;
            document.getElementById('totalRuns').textContent = stats.totalRuns || 0;
            document.getElementById('totalDistance').textContent = ((stats.totalDistance || 0) / 1000).toFixed(1) + 'km';
            
            console.log('Home page stats loaded:', stats);
        });
    </script>
</body>
</html>
