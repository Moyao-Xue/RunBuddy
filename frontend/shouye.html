<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunBuddy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .phone-container {
            position: relative;
            width: 393px;
            height: 852px;
            overflow: hidden;
            border: 2px solid #333;
            border-radius: 40px;
        }

        .page-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 点击区域：缩小到原来的3/4，保持中心点不变 */
        .click-area {
            position: absolute;
            top: 160px;
            left: 222px;
            width: 180px;
            height: 244px;
            background: transparent;
            cursor: pointer;
            z-index: 10;
        }

        .click-area-34 {
            position: absolute;
            top: 470px;
            left: -25px;
            width: 182px;
            height: 275px;
            background: transparent;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <img src="images/shouye.png" alt="Shouye" class="page-bg">
        <!-- 点击区域 -->
        <div class="click-area" onclick="goToPageBg()"></div>
        <div class="click-area-34" onclick="goToPage34()"></div>
    </div>

    <script>
        function goToPageBg() {
            window.location.href = 'iphone17-8.html';
        }

        function goToPage34() {
            window.location.href = 'iphone17-34.html';
        }
    </script>
</body>
</html>
