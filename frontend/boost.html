<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boost Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: #f0f0f0; 
        }

        .phone-container {
            position: relative;
            width: 393px;
            height: 852px;
            overflow: hidden;
            border: 2px solid #333;
            border-radius: 40px;
            background-color: #f4ebd3;
        }

        .page-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

       .hotspot {
            position: absolute;
            background: rgba(255, 0, 0, 0.3); /* 暂时设为淡红色调试位置 */
            border: none;
            cursor: pointer;
            z-index: 1;
        }
        
        /* 调试开关：需要对齐时取消下面注释 */
        /* .hotspot { background: rgba(255, 0, 0, 0.3); border: 1px solid white; } */
    </style>
</head>
<body>
    <div class="phone-container">
        <img src="images/iPhone 17 - 51.png" alt="Boost Shop" class="page-bg">

        <a href="javascript:history.back();" class="hotspot" 
   style="top: 15px; left: 305px; width: 65px; height: 65px;" 
   aria-label="Back"></a>
    </div>
</body>
</html>
