<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunBuddy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: "Pixelify Sans", sans-serif;
        }

        .phone-container {
            position: relative;
            width: 393px;
            height: 852px;
            overflow: hidden;
            border: none;
            border-radius: 0;
        }

        .page-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .top-right-action {
            position: absolute;
            top: 16px;
            left: 324px;
            width: 57px;
            height: 57px;
            display: block;
            z-index: 12;
        }

        .top-right-action img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <img src="images/iPhone 17 - 60.png" alt="iPhone 17 - 60" class="page-bg">
        <a href="customize.html" class="top-right-action" aria-label="Back to customize">
            <img src="images/Group 119 (1).png" alt="Back to customize">
        </a>
    </div>
</body>
</html>
