<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunBuddy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .phone-container {
            position: relative;
            width: 393px;
            height: 852px;
            overflow: hidden;
            border: 2px solid #333;
            border-radius: 40px;
        }

        .page-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 透明按钮 */
        .hotspot {
            position: absolute;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .checkin-button {
            position: absolute;
            left: 54px;
            bottom: 104px;
            width: 285px;
            height: 48px;
            border: 2px solid #000;
            border-radius: 24px;
            background: #9fcce0;
            color: #000;
            font-family: "Pixelify Sans", Helvetica, sans-serif;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 3px 4px 0 rgba(0, 0, 0, 0.2);
            cursor: pointer;
        }

        /* 返回首页按钮：x:343, y:7, w:59, h:57 */
        .btn-back {
            top: 7px;
            left: 343px;
            width: 59px;
            height: 57px;
        }

        /* 跳转按钮：x:346, y:339, w:56, h:55 */
        .btn-iphone60 {
            top: 339px;
            left: 346px;
            width: 56px;
            height: 55px;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <img src="images/iPhone 17 - 62 (1).png" alt="iPhone 17 - 62" class="page-bg">
        <button class="hotspot btn-back" onclick="location.href='shouye.html'"></button>
        <button class="hotspot btn-iphone60" onclick="location.href='settling.html'"></button>
        <button class="checkin-button" onclick="location.href='monthly-checkin.html'">Monthly Check-in</button>
    </div>
</body>
</html>
