<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunBuddy - Running History</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap");
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background-color: #f0f0f0;
            padding-top: 20px;
        }

        .phone-container {
            position: relative;
            width: 393px;
            height: 852px;
            background: #f5f5f5;
            border: none;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        /* 顶部导航栏 */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(135deg, #9fcce0 0%, #7eb8d4 100%);
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 0 20px 15px;
            z-index: 10;
        }

        .header-title {
            font-family: "Pixelify Sans", sans-serif;
            font-size: 28px;
            color: #333;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
        }

        .btn-back {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .btn-back:active {
            transform: scale(0.95);
        }

        .btn-back::before {
            content: "←";
            font-size: 24px;
            color: #333;
        }

        /* 统计摘要区域 */
        .stats-summary {
            position: absolute;
            top: 110px;
            left: 15px;
            right: 15px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            z-index: 5;
        }

        .stat-box {
            text-align: center;
            padding: 10px 5px;
        }

        .stat-value {
            font-family: "Pixelify Sans", sans-serif;
            font-size: 24px;
            color: #9fcce0;
            font-weight: bold;
        }

        .stat-label {
            font-family: "Pixelify Sans", sans-serif;
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        /* 滚动区域 */
        .scroll-container {
            position: absolute;
            top: 280px;
            left: 0;
            right: 0;
            bottom: 100px;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0 15px 20px;
            -webkit-overflow-scrolling: touch;
        }

        .scroll-container::-webkit-scrollbar {
            width: 4px;
        }

        .scroll-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .scroll-container::-webkit-scrollbar-thumb {
            background: #9fcce0;
            border-radius: 2px;
        }

        .section-title {
            font-family: "Pixelify Sans", sans-serif;
            font-size: 18px;
            color: #333;
            margin-bottom: 12px;
            padding-left: 5px;
        }

        /* 跑步记录卡片 */
        .record-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .record-card:active {
            transform: scale(0.98);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .record-date {
            font-family: "Pixelify Sans", sans-serif;
            font-size: 16px;
            color: #333;
            font-weight: bold;
        }

        .record-coins {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: #8B4513;
            font-family: "Pixelify Sans", sans-serif;
            font-size: 14px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        .record-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .record-stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .record-icon {
            width: 36px;
            height: 36px;
            background: #f0f8ff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .record-stat-info {
            display: flex;
            flex-direction: column;
        }

        .record-stat-value {
            font-family: "Pixelify Sans", sans-serif;
            font-size: 16px;
            color: #333;
            font-weight: bold;
        }

        .record-stat-label {
            font-family: "Pixelify Sans", sans-serif;
            font-size: 11px;
            color: #999;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-title {
            font-family: "Pixelify Sans", sans-serif;
            font-size: 22px;
            color: #333;
            margin-bottom: 10px;
        }

        .empty-text {
            font-family: "Pixelify Sans", sans-serif;
            font-size: 14px;
            color: #888;
        }

        /* 底部签到按钮 */
        .bottom-button {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 48px;
            background: linear-gradient(135deg, #9fcce0 0%, #7eb8d4 100%);
            border: none;
            border-radius: 24px;
            font-family: "Pixelify Sans", sans-serif;
            font-size: 18px;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(159, 204, 224, 0.4);
            transition: transform 0.2s;
        }

        .bottom-button:active {
            transform: translateX(-50%) scale(0.97);
        }

        /* 日期分隔线 */
        .date-divider {
            display: flex;
            align-items: center;
            margin: 20px 0 15px;
            gap: 15px;
        }

        .date-divider-line {
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .date-divider-text {
            font-family: "Pixelify Sans", sans-serif;
            font-size: 13px;
            color: #999;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <!-- 顶部导航 -->
        <div class="header">
            <h1 class="header-title">My Runs</h1>
            <button class="btn-back" onclick="location.href='shouye.html'"></button>
        </div>

        <!-- 统计摘要 -->
        <div class="stats-summary">
            <div class="stat-box">
                <div class="stat-value" id="totalRuns">0</div>
                <div class="stat-label">Total Runs</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="totalDistance">0</div>
                <div class="stat-label">Kilometers</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="totalCalories">0</div>
                <div class="stat-label">Calories</div>
            </div>
        </div>

        <!-- 金币统计 -->
        <div class="stats-summary" style="top: 200px;">
            <div class="stat-box">
                <div class="stat-value" id="totalCoins">0</div>
                <div class="stat-label">Total Coins</div>
            </div>
        </div>

        <!-- 滚动历史记录列表 -->
        <div class="scroll-container" id="historyList">
            <div class="section-title">Recent Activities</div>
            <!-- Records will be dynamically inserted here -->
        </div>

        <!-- 底部按钮 -->
        <button class="bottom-button" onclick="location.href='monthly-checkin.html'">Monthly Check-in</button>
    </div>

    <!-- LocalStorage 工具模块 -->
    <script src="js/storage.js"></script>
    
    <script>
        // 格式化日期
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            const options = { month: 'short', day: 'numeric', year: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        // 格式化时间（毫秒转 MM:SS 或 HH:MM:SS）
        function formatDuration(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            
            if (hours > 0) {
                return `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        // 格式化距离（米转公里）
        function formatDistance(meters) {
            return (meters / 1000).toFixed(2);
        }

        // 格式化配速
        function formatPace(pace) {
            if (!pace || pace <= 0) return '--';
            const paceMin = Math.floor(pace);
            const paceSec = Math.round((pace - paceMin) * 60);
            return `${paceMin}'${paceSec.toString().padStart(2, '0')}`;
        }

        // 渲染空状态
        function renderEmptyState(container) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🏃</div>
                    <div class="empty-title">No Runs Yet</div>
                    <div class="empty-text">Start your first run to see your history here!</div>
                </div>
            `;
        }

        // 渲染单条记录卡片
        function renderRecordCard(record) {
            return `
                <div class="record-card">
                    <div class="record-header">
                        <span class="record-date">${formatDate(record.timestamp)}</span>
                        <span class="record-coins">+${record.coinsEarned} 🪙</span>
                    </div>
                    <div class="record-stats">
                        <div class="record-stat">
                            <div class="record-icon">📏</div>
                            <div class="record-stat-info">
                                <span class="record-stat-value">${formatDistance(record.distance)} km</span>
                                <span class="record-stat-label">Distance</span>
                            </div>
                        </div>
                        <div class="record-stat">
                            <div class="record-icon">⏱️</div>
                            <div class="record-stat-info">
                                <span class="record-stat-value">${formatDuration(record.time)}</span>
                                <span class="record-stat-label">Duration</span>
                            </div>
                        </div>
                        <div class="record-stat">
                            <div class="record-icon">⚡</div>
                            <div class="record-stat-info">
                                <span class="record-stat-value">${formatPace(record.pace)}/km</span>
                                <span class="record-stat-label">Pace</span>
                            </div>
                        </div>
                        <div class="record-stat">
                            <div class="record-icon">🔥</div>
                            <div class="record-stat-info">
                                <span class="record-stat-value">${record.calories || 0}</span>
                                <span class="record-stat-label">Calories</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 按日期分组显示记录
        function groupRecordsByDate(records) {
            const groups = {};
            records.forEach(record => {
                const dateKey = formatDate(record.timestamp);
                if (!groups[dateKey]) {
                    groups[dateKey] = [];
                }
                groups[dateKey].push(record);
            });
            return groups;
        }

        // 渲染历史记录列表
        function renderHistoryList() {
            const container = document.getElementById('historyList');
            const history = Storage.getRunHistory();
            
            // 更新统计摘要
            const stats = Storage.getStats();
            document.getElementById('totalRuns').textContent = stats.totalRuns || 0;
            document.getElementById('totalDistance').textContent = ((stats.totalDistance || 0) / 1000).toFixed(1);
            document.getElementById('totalCoins').textContent = stats.totalCoins || 0;
            document.getElementById('totalCalories').textContent = stats.totalCalories || 0;

            if (history.length === 0) {
                renderEmptyState(container);
                return;
            }

            // 按日期分组
            const grouped = groupRecordsByDate(history);
            let html = '<div class="section-title">Recent Activities</div>';
            
            Object.entries(grouped).forEach(([date, records]) => {
                // 添加日期分隔线
                html += `
                    <div class="date-divider">
                        <div class="date-divider-line"></div>
                        <span class="date-divider-text">${date}</span>
                        <div class="date-divider-line"></div>
                    </div>
                `;
                
                // 渲染该日期的所有记录
                records.forEach(record => {
                    html += renderRecordCard(record);
                });
            });

            container.innerHTML = html;
        }

        // 页面加载时渲染
        document.addEventListener('DOMContentLoaded', () => {
            renderHistoryList();
            console.log('Run history loaded:', Storage.getRunHistory());
        });
    </script>
</body>
</html>
