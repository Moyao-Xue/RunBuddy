<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunBuddy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .phone-container {
            position: relative;
            width: 393px;
            height: 852px;
            overflow: hidden;
            border: none;
            border-radius: 0;
        }

        .page-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .top-right-actions {
            position: absolute;
            top: 16px;
            right: 12px;
            display: flex;
            gap: 10px;
            z-index: 12;
        }

        .top-right-action {
            display: block;
            width: 57px;
            height: 57px;
        }

        .top-right-action img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .hotspot {
            position: absolute;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .btn-4 {
            top: 525px;
            left: 340px;
            width: 51px;
            height: 55px;
        }

        .btn-5 {
            top: 615px;
            left: 10px;
            width: 67px;
            height: 72px;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <img src="images/iPhone 17 - 59.png" alt="iPhone 17 - 59" class="page-bg">
        <div class="top-right-actions" aria-label="Top right actions">
            <a href="iphone17-60.html" class="top-right-action" aria-label="Go to iPhone 17 - 60 page">
                <img src="images/Group 125.png" alt="Go to iPhone 17 - 60 page">
            </a>
            <a href="customize.html" class="top-right-action" aria-label="Back to customize">
                <img src="images/Group 119 (1).png" alt="Back to customize">
            </a>
        </div>
        <button class="hotspot btn-4" onclick="location.href='page-bg.html'"></button>
        <button class="hotspot btn-5" onclick="location.href='item-detail.html'"></button>
    </div>
</body>
</html>
