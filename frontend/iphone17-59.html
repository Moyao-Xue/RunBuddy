<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunBuddy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .phone-container {
            position: relative;
            width: 393px;
            height: 852px;
            overflow: hidden;
            border: 2px solid #333;
            border-radius: 40px;
        }

        .page-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .hotspot {
            position: absolute;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .btn-1 {
            top: 13px;
            left: 33px;
            width: 25px;
            height: 25px;
        }

        .btn-2 {
            top: 14px;
            left: 76px;
            width: 42px;
            height: 45px;
        }

        .btn-3 {
            top: 15px;
            left: 121px;
            width: 45px;
            height: 43px;
        }

        .btn-4 {
            top: 525px;
            left: 340px;
            width: 51px;
            height: 55px;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <img src="images/iPhone 17 - 59.png" alt="iPhone 17 - 59" class="page-bg">
        <button class="hotspot btn-1" onclick="location.href='iphone17-35-1.html'"></button>
        <button class="hotspot btn-2" onclick="location.href='iphone17-60.html'"></button>
        <button class="hotspot btn-3" onclick="location.href='runboddy.html'"></button>
        <button class="hotspot btn-4" onclick="location.href='page-bg.html'"></button>
    </div>
</body>
</html>
