<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta charset="utf-8" />
<title>Complete!</title>
<link rel="stylesheet" href="css/settling.css">
</head>
<body>
<main class="iphone" aria-labelledby="completion-title">
<h1 class="text-wrapper-2" id="completion-title">Complete!</h1>

<section class="rectangle" aria-label="Running summary card">
  <button class="text-wrapper" type="button" id="moreBtn">...</button>

  <div class="dropdown-menu" id="dropdownMenu">
    <div class="dropdown-item" id="saveBtn">Save Record</div>
    <div class="dropdown-item" id="shareBtn" style="border: 2px solid red; border-radius: 4px; color: red; font-weight: bold;">Share</div>
    <div class="dropdown-item" id="deleteBtn">Delete</div>
  </div>

  <div class="div">
    <img class="img" src="images/character.png" alt="" />
    <p class="date-apr">
      Date:&nbsp;&nbsp;Apr 14,2026<br/><br/>
      Distance: 5.20Km<br/><br/>
      Pace: 6‘12/KM<br/><br/>
      Duration:32:15<br/><br/>
      Calories: <span id="caloriesValue">245</span> Kcal<br/><br/>
      Weather:
    </p>
    <img class="image" src="images/weather.png" alt="Sunny weather" />
  </div>

  <p class="p">You have kept running for 100 days</p>
  <p class="coins-text">8 coins collected!</p>
</section>

<!-- 返回菜单按钮 -->
<button class="button-back" type="button" id="backToMenuBtn">
  <img src="images/back-up.png" alt="返回菜单">
</button>

<!-- LocalStorage 工具模块 -->
<script src="js/storage.js"></script>

<script>
const moreBtn = document.getElementById('moreBtn');
const dropdownMenu = document.getElementById('dropdownMenu');
const shareBtn = document.getElementById('shareBtn');
const backToMenuBtn = document.getElementById('backToMenuBtn');

// 开关下拉菜单
moreBtn.addEventListener('click', () => {
  dropdownMenu.classList.toggle('show');
});

// 点击外部关闭
document.addEventListener('click', (e) => {
  if (!moreBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
    dropdownMenu.classList.remove('show');
  }
});

// Share 跳转到分享页
shareBtn.addEventListener('click', () => {
  window.location.href = 'share.html';
});

// Back to menu 跳转到主页
backToMenuBtn.addEventListener('click', () => {
  window.location.href = 'shouye.html';
});

// 从 localStorage 加载本次跑步数据
document.addEventListener('DOMContentLoaded', () => {
  const session = Storage.getLastSession();
  const stats = Storage.getStats();
  
  if (session) {
    // 更新金币显示
    const coinsText = document.querySelector('.coins-text');
    if (coinsText) {
      coinsText.textContent = `${session.coinsEarned || 0} coins collected!`;
    }
    
    // 更新日期
    const dateEl = document.querySelector('.date-apr');
    if (dateEl && session.timestamp) {
      const date = new Date(session.timestamp);
      const formattedDate = `Date:    ${date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
      const distance = ((session.distance || 0) / 1000).toFixed(2);
      const duration = formatDuration(session.time || 0);
      
      dateEl.innerHTML = dateEl.innerHTML.replace(
        /Date:&nbsp;&nbsp;[^<]*/,
        formattedDate
      ).replace(
        /Distance: [^<]*/,
        `Distance: ${distance}Km`
      ).replace(
        /Duration:[^<]*/,
        `Duration:${duration}`
      );
      
      // 更新卡路里显示
      const caloriesEl = document.getElementById('caloriesValue');
      if (caloriesEl && session.calories) {
        caloriesEl.textContent = session.calories;
      }
    }
    
    console.log('Session loaded:', session);
  }
  
  console.log('Total stats:', stats);
});

// 格式化时间（毫秒转 MM:SS 或 HH:MM:SS）
function formatDuration(ms) {
  const totalSeconds = Math.floor(ms / 1000);
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  
  if (hours > 0) {
    return `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
  }
  return `${minutes}:${seconds.toString().padStart(2, '0')}`;
}
</script>

</main>
</body>
</html>
