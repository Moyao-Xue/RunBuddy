<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunBuddy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .phone-container {
            position: relative;
            width: 393px;
            height: 852px;
            overflow: hidden;
            border: 2px solid #333;
            border-radius: 40px;
            background: #f4ebd3;
        }

        .page-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .top-strip,
        .bottom-strip {
            position: absolute;
            background: #9fcce0;
            z-index: 1;
        }

        .top-strip {
            top: 0;
            left: 0;
            right: 0;
            width: auto;
            height: 62px;
            transform: none;
            z-index: 10;
        }

        .bottom-strip {
            bottom: 0;
            left: 0;
            right: 0;
            height: 74px;
        }

        .content {
            position: relative;
            z-index: 2;
            padding: 143px 29px 106px;
            display: flex;
            flex-direction: column;
            gap: 31px;
            height: 100%;
        }

        .panel {
            flex: 1;
            overflow: hidden;
            background: #d9d9d9;
        }

        .panel img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .back-button {
            position: absolute;
            top: 60px;
            right: 27px;
            z-index: 20;
            width: 39px;
            height: 39px;
            padding: 0;
            border: 0;
            background: transparent;
            cursor: pointer;
        }

        .back-button img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <img src="images/iphone-17-61-2@2x.png" alt="RunBuddy page background" class="page-bg">
        <div class="top-strip"></div>
        <div class="bottom-strip"></div>

        <button class="back-button" onclick="location.href='iphone17-34.html'" aria-label="Back to professional guidance">
            <img src="images/close-up-default@2x.png" alt="">
        </button>

        <div class="content">
            <div class="panel">
                <img src="images/chatgpt-image-2026-4-14-14-49-12-1@2x.png" alt="Runners in town">
            </div>
            <div class="panel"></div>
        </div>
    </div>
</body>
</html>
