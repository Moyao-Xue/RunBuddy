<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Pixelify+Sans:400,600&display=swap" rel="stylesheet">
    <title>RunBuddy - Customize</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            font-family: 'Pixelify Sans', sans-serif;
        }

        .phone-container {
            position: relative;
            width: 393px;
            height: 852px;
            overflow: hidden;
            border: 2px solid #333;
            border-radius: 40px;
            background-color: #f4ebd3;
        }

        .page-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .hotspot {
            position: absolute;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 1;
        }

        /* .hotspot { border: 1px solid white; } */
    </style>
</head>
<body>
    <div class="phone-container">
        <img src="images/iPhone 17 - 48.png" alt="Customize Page" class="page-bg">

        <a href="iphone17-35-1.html" class="hotspot"
           style="top: 15px; left: 28px; width: 40px; height: 40px;"
           aria-label="Cart"></a>

        <a href="customize.html" class="hotspot"
           style="top: 15px; left: 120px; width: 40px; height: 40px;"
           aria-label="Back"></a>

        <a href="item-detail.html" class="hotspot"
           style="top: 600px; left: 12px; width: 70px; height: 70px;"
           aria-label="Select Blue Jacket"></a>
    </div>
</body>
</html>
