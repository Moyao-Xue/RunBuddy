<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunBuddy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .phone-container {
            position: relative;
            width: 393px;
            height: 852px;
            overflow: hidden;
            border: none;
            border-radius: 0;
        }

        .page-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .hotspot {
            position: absolute;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .btn-1 {
            top: 510px;
            left: 215px;
            width: 98px;
            height: 38px;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <img src="images/iPhone 17 - 58.png" alt="iPhone 17 - 58" class="page-bg">
        <button class="hotspot btn-1" onclick="location.href='iphone17-59.html'"></button>
    </div>
</body>
</html>
