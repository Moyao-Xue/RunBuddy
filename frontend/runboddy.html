<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunBuddy Hotspot Page</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }

        .phone-container {
            position: relative;
            width: 393px;
            height: 852px;
            overflow: hidden;
            border: 2px solid #333;
            border-radius: 40px;
        }

        .page-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* 这是你的透明热区按钮 */
        .hotspot {
            position: absolute;
            background: rgba(255, 0, 0, 0.2); /* 暂时设为淡红色，方便你确认位置 */
            border: none;
            cursor: pointer;
            z-index: 1;
        }
        
        /* 调试完毕后，请把上面 .hotspot 里的 background 改为 transparent */
    </style>
</head>
<body>
    <div class="phone-container">
        <img src="images/iPhone 17 - 52.png" alt="Page Background" class="page-bg">

        <a href="boost.html" class="hotspot" 
           style="top: 80px; left: 21px; width: 347px; height: 182px;" 
           aria-label="Boost Shop"></a>
        
        <a href="iphone17-35-1.html" class="hotspot" 
           style="top: 308px; left: 21px; width: 347px; height: 182px;" 
           aria-label="Fashion Shop"></a>
        
        <a href="customize.html" class="hotspot" 
           style="top: 550px; left: 21px; width: 347px; height: 182px;" 
           aria-label="Customize Buddy"></a>

        <a href="shouye.html" class="hotspot" 
           style="top: 765px; left: 100px; width: 190px; height: 35px;" 
           aria-label="Back to town"></a>
    </div>
</body>
</html>
