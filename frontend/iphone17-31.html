<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunBuddy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .phone-container {
            position: relative;
            width: 393px;
            height: 852px;
            overflow: hidden;
            border: 2px solid #333;
            border-radius: 40px;
        }

        .page-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 透明按钮 */
        .hotspot {
            position: absolute;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        /* 自定义按钮位置 */
        .btn-back {
            top: 17px;
            left: 339px;
            width: 59px;
            height: 57px;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <img src="images/iPhone 17 - 31.png" alt="iPhone 17 - 31" class="page-bg">
        <button class="hotspot btn-back" onclick="location.href='shouye.html'"></button>
    </div>
</body>
</html>
