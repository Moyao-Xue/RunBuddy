<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunBuddy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .phone-container {
            position: relative;
            width: 393px;
            height: 852px;
            overflow: hidden;
            border: none;
            border-radius: 40px;
            box-shadow: none;
        }

        .page-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 透明按钮 */
        .hotspot {
            position: absolute;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        /* 左上角按钮1 */
        .btn-1 {
            top: 12px;
            left: 32px;
            width: 48px;
            height: 48px;
        }

        /* 左上角按钮2 */
        .btn-2 {
            top: 12px;
            left: 76px;
            width: 48px;
            height: 48px;
        }

        /* 左上角按钮3 */
        .btn-3 {
            top: 12px;
            left: 119px;
            width: 50px;
            height: 48px;
        }

        /* 右下角按钮 */
        .btn-4 {
            top: 520px;
            left: 325px;
            width: 53px;
            height: 50px;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <img src="images/page-bg.png" alt="Page BG" class="page-bg">
        <button class="hotspot btn-1" onclick="location.href='iphone17-35-1.html'"></button>
        <button class="hotspot btn-2" onclick="location.href='iphone17-31.html'"></button>
        <button class="hotspot btn-3" onclick="location.href='shouye.html'"></button>
        <button class="hotspot btn-4"></button>
    </div>
</body>
</html>
